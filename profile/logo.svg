<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="turbo-spark" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF1D5D"/>
      <stop offset="50%"  stop-color="#892FE8"/>
      <stop offset="100%" stop-color="#1A87FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="96" fill="#0d0d0d"/>

  <!-- Star shape scaled up from 24×24 to 512×512 (×21.33) -->
  <path d="M256 0 C256 149.3 277.3 234.7 512 256 C277.3 277.3 256 362.7 256 512 C256 362.7 234.7 277.3 0 256 C234.7 234.7 256 149.3 256 0 Z"
        fill="url(#turbo-spark)" filter="url(#glow)"/>
</svg>
